<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Auth Callback</title>
    <style>
        :root {
            --brand: #0f6cbd;          /* Fluent 2 communication blue */
            --brand-dark: #115ea3;
            --ink: #242424;
            --ink-2: #616161;
            --line: #e0e0e0;
            --danger: #b10e1c;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: "Segoe UI", "Segoe UI Web (West European)", -apple-system, system-ui, Arial, sans-serif;
            color: var(--ink);
            background: radial-gradient(1200px 600px at 50% -10%, #eaf2fb 0%, #f5f5f5 55%, #f0f0f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            position: relative;
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10), 0 1px 2px rgba(0, 0, 0, 0.06);
            padding: 40px 36px 34px;
            text-align: center;
            overflow: hidden;
        }
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--brand), #2b88d8);
        }
        .badge {
            width: 56px;
            height: 56px;
            margin: 4px auto 22px;
            border-radius: 50%;
            background: #eaf2fb;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand);
        }
        .badge svg { width: 30px; height: 30px; display: block; }
        .spinner {
            width: 38px;
            height: 38px;
            margin: 0 auto 20px;
            border: 3px solid #e6e6e6;
            border-top-color: var(--brand);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #msg {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.35;
            margin: 0;
        }
        .sub {
            margin: 8px 0 0;
            font-size: 0.85rem;
            color: var(--ink-2);
            line-height: 1.4;
        }
        .foot {
            margin-top: 26px;
            padding-top: 16px;
            border-top: 1px solid var(--line);
            font-size: 0.72rem;
            letter-spacing: 0.02em;
            color: #8a8886;
            text-transform: uppercase;
        }
        .err { color: var(--danger); }
        .err-hide { display: none; }
    </style>
    <!--
      Generic, REUSABLE MSAL redirect URI page for kofc_authclient.js (KOFC.Auth).
      Holds no configuration — everything is read at runtime from localStorage, which the
      library writes before redirecting (kofc_eapp_msal_cfg + kofc_eapp_pending). The same
      page therefore works for any button/entity/integration built on KOFC.Auth.

      Two flows land here:
        1) ssoSilent hidden iframe  -> stay blank; the parent MSAL reads the response.
        2) full-page redirect back  -> load MSAL, run handleRedirectPromise() to read the ?code=/#code=
           and cache the token. If a "pending" action was saved (kofc_eapp_pending), finish it:
           call the API with the token, then open targetUrl + "?soreq=<base64>" — so the user does
           NOT have to click the button again. Otherwise just return to the D365 form (returnUrl).

      Reads localStorage keys written by KOFC.Auth: kofc_eapp_msal_cfg + kofc_eapp_pending.

      Register this URL in Entra (case-sensitive, SPA platform) under EACH app registration that uses it:
        https://<org>.crm.dynamics.com/WebResources/kofc_authcallback.html
    -->
</head>
<body>
    <div class="card" role="status" aria-live="polite">
        <div class="badge" aria-hidden="true">
            <!-- Fluent-style shield/lock: secure sign-in -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2.2 4.5 5v6.1c0 4.6 3.2 8.9 7.5 10.2 4.3-1.3 7.5-5.6 7.5-10.2V5L12 2.2Z"
                      fill="currentColor" opacity="0.12"/>
                <path d="M12 2.2 4.5 5v6.1c0 4.6 3.2 8.9 7.5 10.2 4.3-1.3 7.5-5.6 7.5-10.2V5L12 2.2Z"
                      stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <path d="M9.6 12.2l1.7 1.7 3.3-3.6" stroke="currentColor" stroke-width="1.6"
                      stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div id="spinner" class="spinner"></div>
        <p id="msg">Signing you in…</p>
        <p class="sub">Please wait — you'll be redirected to your application automatically.</p>
        <div class="foot">Secured by Microsoft Entra ID</div>
    </div>
    <script>
        (function () {
            "use strict";

            var CFG_KEY = "kofc_eapp_msal_cfg";
            var PENDING_KEY = "kofc_eapp_pending";
            var msgEl = document.getElementById("msg");
            var spinnerEl = document.getElementById("spinner");

            function setMsg(text, isErr) {
                if (!msgEl) { return; }
                msgEl.textContent = text;
                msgEl.className = isErr ? "err" : "";
                // Hide the spinner once we hit a terminal error state.
                if (spinnerEl) {
                    spinnerEl.className = isErr ? "spinner err-hide" : "spinner";
                }
            }

            // 1) ssoSilent hidden iframe: do nothing — the parent window reads the hash.
            if (window.self !== window.top) {
                return;
            }

            var hasAuthResponse = window.location.hash.indexOf("code=") >= 0
                || window.location.hash.indexOf("error=") >= 0
                || window.location.search.indexOf("code=") >= 0
                || window.location.search.indexOf("error=") >= 0;

            // Opened directly (no auth response): nothing to process.
            if (!hasAuthResponse) {
                setMsg("Auth callback page. Return to Dynamics and use the button.");
                return;
            }

            function readJson(key) {
                try {
                    var raw = localStorage.getItem(key);
                    return raw ? JSON.parse(raw) : null;
                } catch (e) {
                    return null;
                }
            }

            function loadMsal() {
                return new Promise(function (resolve, reject) {
                    if (typeof msal !== "undefined") {
                        resolve();
                        return;
                    }
                    var s = document.createElement("script");
                    s.src = window.location.origin + "/WebResources/kofc_msalbrowsermin";
                    s.onload = function () {
                        if (typeof msal !== "undefined") {
                            resolve();
                        } else {
                            reject(new Error("MSAL failed to load."));
                        }
                    };
                    s.onerror = function () {
                        reject(new Error("MSAL web resource not found."));
                    };
                    document.head.appendChild(s);
                });
            }

            async function callApi(pending, token) {
                var method = (pending.httpMethod || "POST").toUpperCase();
                var base = pending.boomiUrl;
                var qs = "userId=" + encodeURIComponent(pending.userId);
                if (pending.oppId) {
                    qs += "&oppID=" + encodeURIComponent(pending.oppId);
                }
                var url = base + (base.indexOf("?") >= 0 ? "&" : "?") + qs;

                var options = {
                    method: method,
                    headers: {
                        "Authorization": "Bearer " + token,
                        "x-api-key": pending.apiKey,
                        "Accept": "text/plain"
                    }
                };
                if (method !== "GET" && method !== "HEAD") {
                    options.headers["Content-Type"] = "application/json";
                    options.body = JSON.stringify({
                        userId: pending.userId,
                        oppID: pending.oppId || undefined
                    });
                }

                var response = await fetch(url, options);
                var body = await response.text();
                if (!response.ok) {
                    throw new Error("API returned " + response.status + ": " + body);
                }
                return body;
            }

            function finishAction(pending, base64) {
                var targetUrl = pending.eappUrl + "?soreq=" + base64;
                // Prefer opening the target app in a new tab and returning this tab to the D365 form.
                var win = null;
                try {
                    win = window.open(targetUrl, "_blank");
                } catch (e) {
                    win = null;
                }
                var cfg = readJson(CFG_KEY);
                if (win) {
                    setMsg("Opened in a new tab. Returning to Dynamics...");
                    if (cfg && cfg.returnUrl) {
                        window.location.href = cfg.returnUrl;
                    }
                } else {
                    // Popup blocked — navigate this tab straight to the target app.
                    setMsg("Opening your application...");
                    window.location.href = targetUrl;
                }
            }

            async function run() {
                var cfg = readJson(CFG_KEY);
                if (!cfg || !cfg.clientId || !cfg.tenantId || !cfg.redirectUri) {
                    setMsg("Missing sign-in context. Open Dynamics and click the button again.", true);
                    return;
                }

                try {
                    await loadMsal();
                    var pca = new msal.PublicClientApplication({
                        auth: {
                            clientId: cfg.clientId,
                            authority: "https://login.microsoftonline.com/" + cfg.tenantId,
                            redirectUri: cfg.redirectUri
                        },
                        cache: {
                            cacheLocation: "localStorage",
                            storeAuthStateInCookie: true
                        }
                    });

                    await pca.initialize();
                    // Reads the code from this page's URL, exchanges it (PKCE), and caches the token.
                    var result = await pca.handleRedirectPromise();

                    var pending = readJson(PENDING_KEY);

                    // Resolve an access token: from the redirect result, or silently from cache.
                    var token = result && result.accessToken ? result.accessToken : null;
                    if (!token && pending && pending.apiScopes) {
                        var accounts = pca.getAllAccounts();
                        if (accounts.length > 0) {
                            try {
                                var silent = await pca.acquireTokenSilent({
                                    scopes: pending.apiScopes,
                                    account: accounts[0]
                                });
                                token = silent.accessToken;
                            } catch (e) {
                                // fall through to no-token handling
                            }
                        }
                    }

                    if (token && pending && pending.eappUrl && pending.boomiUrl) {
                        setMsg("Sign-in complete. Finishing your request...");
                        try {
                            var base64 = await callApi(pending, token);
                            localStorage.removeItem(PENDING_KEY);
                            finishAction(pending, base64);
                        } catch (e) {
                            setMsg("Request failed: " + (e && e.message ? e.message : String(e)), true);
                        }
                        return;
                    }

                    // No pending action: just cache the token and return to the form.
                    if (token) {
                        setMsg("Sign-in complete. Returning to Dynamics...");
                        if (cfg.returnUrl) {
                            window.location.href = cfg.returnUrl;
                            return;
                        }
                        setMsg("Sign-in complete. You can close this tab and return to Dynamics.");
                        return;
                    }

                    setMsg("Sign-in response received but no token was produced. Try the button again.", true);
                } catch (e) {
                    setMsg("Sign-in failed: " + (e && e.message ? e.message : String(e)), true);
                }
            }

            run();
        })();
    </script>
</body>
</html>
